name: Deploy study app to GitHub Pages

# Publishes the static study app so Hansol can use it from any device.
# One-time setup by the repo owner: GitHub → Settings → Pages → Build and
# deployment → Source: "GitHub Actions". After that, every push to the default
# branch redeploys automatically to https://<owner>.github.io/hello-world/

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .            # repo root contains index.html + vocab.js
      - id: deployment
        uses: actions/deploy-pages@v4
