name: Daily SSIS School Email Check

on:
  schedule:
    - cron: '0 1 * * *'   # 9:00 AM SGT (UTC+8) every day
  workflow_dispatch:        # also triggerable manually from the Actions tab

jobs:
  sync-emails:
    name: Sync school emails → Notion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run email sync
        env:
          GMAIL_TOKEN_JSON:  ${{ secrets.GMAIL_TOKEN_JSON }}
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_PAGE_ID:    37663bf2fb5c81a1aa46e2bc608b60a4
        run: python scripts/school_email_sync.py
